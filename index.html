<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公告中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            padding: 60px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 32px;
            color: #333;
            margin-bottom: 40px;
        }

        .announcement-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .announcement-card {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: all 0.3s;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .announcement-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        }

        .announcement-card h2 {
            font-size: 20px;
            color: #333;
            margin-bottom: 8px;
        }

        .announcement-card p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }

        .announcement-card .date {
            margin-top: 12px;
            font-size: 13px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>公告中心</h1>
        <div class="announcement-list">
            <a href="announcement-1.html" class="announcement-card">
                <h2>乐一番运回意向调查</h2>
                <p>针对本群在了一番切煤的物品的运回方式调查问卷</p>
                <div class="date">截止日期：3月28日晚</div>
            </a>
            <a href="announcement-2.html" class="announcement-card">
                <h2>黑西吧唧收推车</h2>
                <p>请吃了【团 奥 玖】的老师提交推车</p>
                <div class="date">截止日期：3月25日晚21:00</div>
            </a>
            <a href="announcement-3.html" class="announcement-card">
                <h2>萌番+官网现货火热交肾中</h2>
                <p>wx提交需要手续费，备注cn+萌番/官网国际</p>
                <div class="date">截止日期：3月27日晚11:00</div>
            </a>
        </div>
    </div>
</body>
</html>
