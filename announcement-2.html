<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黑西吧唧收推车</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #fff;
            min-height: 100vh;
            padding: 60px 20px;
            line-height: 1.8;
            color: #333;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .back-link {
            display: inline-block;
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 24px;
            text-align: center;
        }

        .content {
            font-size: 16px;
        }

        .content p {
            margin-bottom: 16px;
        }

        .rules {
            background: #f8f9fa;
            padding: 20px 24px;
            border-radius: 8px;
            margin: 24px 0;
        }

        .rules li {
            margin-bottom: 12px;
        }

        .deadline {
            margin-top: 24px;
            text-align: center;
            color: #ff4d4f;
            font-weight: bold;
            font-size: 18px;
        }

        .note {
            margin-top: 16px;
            text-align: center;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← 返回公告列表</a>

        <h1>黑西吧唧收推车</h1>

        <div class="content">
            <p>请吃了【团 奥 玖】的老师提交推车。</p>

            <div class="rules">
                <ul>
                    <li>推车截图需要露出具体时间，要求至少早于推车作业发布时间。</li>
                    <li>有 <strong>有效推车</strong> 只需提交有效，并在图上标注 <strong>有效</strong>。</li>
                    <li>没有则只提交无效，无效多张拼成长图，并在图上标注 <strong>无效</strong>。</li>
                </ul>
            </div>

            <p class="deadline">DDL：3月25日晚 21:00</p>

            <p class="note">不交视为躺吃，特殊情况提前私信。</p>
        </div>
    </div>
</body>
</html>
